<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社会主义核心价值观</title>

  <!-- 字体美化（思源黑体） -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
      background: radial-gradient(circle at top, #ff4d4d, #7a0000);
      color: #fff;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 50px 20px 20px;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      letter-spacing: 4px;
      animation: fadeDown 1s ease-out;
    }

    .subtitle {
      text-align: center;
      opacity: 0.85;
      margin-bottom: 20px;
      animation: fadeDown 1.5s ease-out;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
      padding: 30px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 25px 10px;
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 600;
      backdrop-filter: blur(6px);
      cursor: pointer;
      transition: all 0.3s ease;
      animation: fadeUp 0.8s ease forwards;
      opacity: 0;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.05);
      background: rgba(255, 255, 255, 0.18);
    }

    .card.active {
      background: rgba(255,255,255,0.25);
      transform: scale(1.08);
    }

    .description {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.9;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      opacity: 0.7;
    }

    /* 动画 */
    @keyframes fadeUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* 延迟动画 */
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }
    .card:nth-child(5) { animation-delay: 0.5s; }
    .card:nth-child(6) { animation-delay: 0.6s; }
    .card:nth-child(7) { animation-delay: 0.7s; }
    .card:nth-child(8) { animation-delay: 0.8s; }
    .card:nth-child(9) { animation-delay: 0.9s; }
    .card:nth-child(10) { animation-delay: 1s; }
    .card:nth-child(11) { animation-delay: 1.1s; }
    .card:nth-child(12) { animation-delay: 1.2s; }
  </style>
</head>
<body>

<header>社会主义核心价值观</header>
<div class="subtitle">点击下方词语查看解释</div>

<div class="container" id="container"></div>

<footer>© 2026 宣传展示页面</footer>

<script>
  const data = [
    { name: "富强", desc: "国家繁荣富强，经济实力雄厚" },
    { name: "民主", desc: "人民当家作主，政治制度民主" },
    { name: "文明", desc: "社会进步，文化繁荣，风尚良好" },
    { name: "和谐", desc: "社会稳定，人际关系融洽" },
    { name: "自由", desc: "公民依法享有广泛权利" },
    { name: "平等", desc: "人人享有平等权利和机会" },
    { name: "公正", desc: "社会公平正义得到保障" },
    { name: "法治", desc: "依法治国，法律权威至上" },
    { name: "爱国", desc: "热爱祖国，维护国家利益" },
    { name: "敬业", desc: "恪尽职守，努力工作" },
    { name: "诚信", desc: "诚实守信，言行一致" },
    { name: "友善", desc: "待人友好，互助互爱" }
  ];

  const container = document.getElementById("container");

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<div>${item.name}</div>`;

    div.addEventListener("click", () => {
      document.querySelectorAll('.card').forEach(c => {
        c.classList.remove('active');
        if (c.querySelector('.description')) {
          c.removeChild(c.querySelector('.description'));
        }
      });

      div.classList.add("active");

      const desc = document.createElement("div");
      desc.className = "description";
      desc.innerText = item.desc;

      div.appendChild(desc);
    });

    container.appendChild(div);
  });
</script>

</body>
</html>
